<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <span class="logo">TUFF Scout</span>
    <label class="theme-switch-wrap" title="Toggle dark mode" aria-label="Toggle dark mode">
      <span class="theme-icon">☀︎</span>
      <span class="toggle-switch">
        <input type="checkbox" id="theme-toggle" class="toggle-input" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </span>
      <span class="theme-icon">◑</span>
    </label>
  </header>

  <main class="app-shell">

    <!-- ── Search view ── -->
    <div id="view-search" class="view">
      <div class="page-heading">
        <h1>Team Lookup</h1>
        <p class="page-sub">Search teams by number or browse an event roster.</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="team">By Team Number</button>
        <button class="tab" data-tab="event">Browse Events</button>
        <button class="tab" data-tab="standings">Standings</button>
        <button class="tab" data-tab="map" id="map-nav-btn">Explore Teams</button>
      </div>

      <!-- Team search panel -->
      <div class="search-row" id="panel-team">
        <input id="teamNumber" type="text" placeholder="e.g. 2397A or 8838E" autocomplete="off" />
        <button id="teamSearchBtn" class="btn-primary">Search</button>
      </div>

      <!-- Event browse panel -->
      <div class="event-controls hidden" id="panel-event">
        <div class="event-search-row">
          <select id="seasonSelect" class="season-select"></select>
          <input id="eventFilter" type="text" placeholder="Filter by name, city, or SKU…" autocomplete="off" />
        </div>
      </div>

      <div id="search-status" class="status hidden"></div>
      <div id="search-results"></div>
    </div>

    <!-- ── Event detail view ── -->
    <div id="view-event" class="view hidden">
      <button class="back-btn" id="back-to-events">← Back to events</button>
      <div id="event-detail-hero"></div>
      <div id="division-selector"></div>
      <div id="event-tabs-bar"></div>
      <div id="event-tab-status" class="status hidden"></div>
      <div id="event-tab-content"></div>
    </div>

    <!-- ── Seasons view ── -->
    <div id="view-seasons" class="view hidden">
      <button class="back-btn" id="back-to-search">← Back to results</button>
      <div id="team-hero"></div>
      <div id="seasons-status" class="status hidden"></div>
      <div id="seasons-grid"></div>
    </div>

    <!-- ── Stats view ── -->
    <div id="view-stats" class="view hidden">
      <button class="back-btn" id="back-to-seasons">← Back to seasons</button>
      <div id="season-hero"></div>
      <div id="stats-status" class="status hidden"></div>
      <div id="stats-content"></div>
    </div>

    <!-- ── Team at Event view ── -->
    <div id="view-team-event" class="view hidden">
      <button class="back-btn" id="back-to-event-from-team">← Back to event</button>
      <div id="team-event-hero"></div>
      <div id="team-event-status" class="status hidden"></div>
      <div id="team-event-content"></div>
    </div>

    <!-- ── Standings view ── -->
    <div id="view-standings" class="view hidden">
      <button class="back-btn" id="back-from-standings">← Back</button>
      <div class="page-heading">
        <h1>Skills Standings</h1>
        <p class="page-sub">Top skills scores by program — driver, programming, and combined.</p>
      </div>
      <div id="standings-controls"></div>
      <div id="standings-filters"></div>
      <div id="standings-status" class="status hidden"></div>
      <div id="standings-content"></div>
    </div>

    <!-- ── World Map view ── -->
    <div id="view-map" class="view hidden">
      <button class="back-btn" id="back-from-map">← Back</button>
      <div class="page-heading">
        <h1>World Team Map</h1>
        <p class="page-sub">Team distribution by country across VEX programs.</p>
      </div>
      <div id="map-filters"></div>
      <div id="map-container"></div>
      <div id="map-legend"></div>
      <div id="map-country-panel" class="hidden"></div>
    </div>

  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="script.js"></script>
</body>
</html>
